<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근무표 · 휴가/교대 관리</title>
<style>
  :root{
    --blue:#2f6fed; --green:#2e8b3d; --orange:#e2691a;
    --ink:#1c2430; --sub:#697180; --line:#e6e9ee; --bg:#f6f7f9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--ink); padding:16px 16px 60px; overflow-x:auto;
  }
  .wrap{max-width:1400px; margin:0 auto;}
  .zoom-bar{
    position:fixed; top:10px; right:10px; display:flex; align-items:center; gap:4px;
    background:#fff; padding:5px; border-radius:11px; box-shadow:0 2px 10px rgba(0,0,0,.15); z-index:60;
  }
  .zoom-bar button{
    width:32px; height:32px; border-radius:8px; border:1px solid var(--line);
    background:#f6f7f9; font-size:16px; font-weight:800; cursor:pointer; color:var(--ink);
  }
  .zoom-bar button:active{background:#eceff3;}
  .zoom-bar .pct{font-size:12px; font-weight:700; color:var(--sub); width:38px; text-align:center;}
  .nav{display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:6px;}
  .nav button{
    width:38px; height:38px; border-radius:50%; border:none; background:var(--blue);
    color:#fff; font-size:18px; cursor:pointer;
  }
  .nav button:active{transform:scale(0.94);}
  .ttl{font-size:22px; font-weight:800;}
  .subttl{text-align:center; font-size:26px; font-weight:800; color:#2c2f8f; margin:6px 0 16px;}
  table{width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.06);}
  th{padding:10px 4px; font-size:14px; color:var(--sub); border-bottom:1px solid var(--line);}
  th.sat{color:var(--blue);} th.sun{color:#d43a3a;}
  td{
    vertical-align:top; width:14.28%; height:96px; border:1px solid var(--line);
    padding:6px 5px; font-size:13px;
  }
  td.other{background:#fafafa; color:#c7cbd1;}
  .date{font-weight:700; font-size:14px; margin-bottom:4px;}
  .date.holiday{color:#d43a3a;}
  .date.today{
    display:flex; align-items:center; justify-content:center;
    width:22px; height:22px; border-radius:50%;
    background:var(--blue); color:#fff !important;
    animation: todayBlink 1.2s ease-in-out infinite;
  }
  @keyframes todayBlink{
    0%,100%{opacity:1;}
    50%{opacity:0.35;}
  }
  .holiday-name{font-size:9.5px; color:#d43a3a; font-weight:700; margin:-2px 0 4px; line-height:1.2; min-height:12px; white-space:nowrap;}
  .badge{
    display:flex; align-items:center; gap:4px; flex-wrap:wrap;
    color:#fff; font-weight:700; font-size:12px; border-radius:5px;
    padding:3px 6px; margin-bottom:4px; cursor:pointer; line-height:1.3;
  }
  .badge:active{opacity:.85;}
  .t1{background:var(--blue);} .t2{background:var(--green);} .t3{background:var(--orange);}
  .entry-line{font-weight:600; font-size:10px; line-height:1.3; white-space:nowrap; width:100%;}
  .entry-list{margin:10px 0;}
  .entry-item{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:8px 10px; border:1px solid var(--line); border-radius:9px; margin-bottom:6px; font-size:13px;
  }
  .entry-item .txt{font-weight:700;}
  .entry-item .del{
    color:#c53030; font-size:12px; font-weight:700; cursor:pointer;
    padding:3px 8px; border:1px solid #f3c9c9; border-radius:7px; background:#fff5f5; flex-shrink:0;
  }
  .badge.swap-origin{ box-shadow: 0 0 0 3px #111; }
  .badge.blink-candidate{
    animation: candidateBlink 1s ease-in-out infinite;
    box-shadow: 0 0 0 3px #ffd400;
  }
  @keyframes candidateBlink{
    0%,100%{ filter:brightness(1); }
    50%{ filter:brightness(1.55); }
  }
  .swap-banner{
    display:none; position:fixed; top:10px; left:50%; transform:translateX(-50%);
    background:#111; color:#fff; padding:10px 14px; border-radius:11px; font-size:13px;
    font-weight:700; z-index:70; align-items:center; gap:10px; max-width:90vw; text-align:center;
  }
  .swap-banner button{
    background:#fff; color:#111; border:none; border-radius:7px; padding:5px 10px;
    font-weight:700; cursor:pointer; font-size:12px; flex-shrink:0;
  }

  /* modal */
  .overlay{
    position:fixed; inset:0; background:rgba(20,24,32,.45);
    display:none; align-items:center; justify-content:center; padding:16px; z-index:50;
  }
  .overlay.open{display:flex;}
  .modal{
    background:#fff; border-radius:14px; padding:20px; width:100%; max-width:340px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
  }
  .modal h3{margin:0 0 4px; font-size:17px;}
  .modal .desc{color:var(--sub); font-size:13px; margin-bottom:14px;}
  .modal label{display:block; font-size:13px; font-weight:700; margin:10px 0 5px;}
  .modal select{
    width:100%; padding:9px 8px; border-radius:8px; border:1px solid var(--line);
    font-size:14px; background:#fff;
  }
  .choice-row{display:flex; gap:8px; margin-top:6px;}
  .choice-row button{
    flex:1; padding:12px 6px; border-radius:10px; border:1px solid var(--line);
    background:#f6f7f9; font-size:14px; font-weight:700; cursor:pointer;
  }
  .choice-row button:active{background:#eceff3;}
  .actions{display:flex; gap:8px; margin-top:18px;}
  .actions button{
    flex:1; padding:11px 6px; border-radius:9px; border:none; font-size:14px; font-weight:700; cursor:pointer;
  }
  .btn-cancel{background:#eef0f3; color:var(--ink);}
  .btn-clear{background:#ffe3e3; color:#c53030;}
  .btn-confirm{background:var(--blue); color:#fff;}
  .back{
    display:inline-block; margin-bottom:10px; font-size:13px; color:var(--sub);
    cursor:pointer; text-decoration:underline;
  }
  .chip-grid{display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;}
  .chip{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px; width:72px; padding:10px 4px; border-radius:12px; border:2px solid var(--line);
    background:#fff; font-size:12px; font-weight:700; color:var(--ink); cursor:pointer;
  }
  .chip .ic{font-size:20px; line-height:1;}
  .chip.selected{border-color:var(--blue); background:#eaf1ff; color:var(--blue);}
  .chip:active{transform:scale(0.96);}
  .chip.disabled{
    opacity:0.35; cursor:not-allowed; background:#f2f2f2; color:#9aa0aa;
    animation:none; box-shadow:none;
  }
  .team-group{margin-bottom:8px;}
  .team-label{
    display:inline-block; font-size:11px; font-weight:800; color:#fff;
    padding:2px 8px; border-radius:6px; margin-bottom:4px;
  }
  .hours-summary{
    background:#eef4ff; padding:2px 6px !important; border:1px solid var(--line);
    text-align:center; line-height:1.3; height:auto !important; width:auto !important;
  }
  .hours-chip{
    display:inline-block; font-size:9.5px; font-weight:700; color:#33507a;
    margin:0 5px;
  }
  .hours-chip.over{ color:#c53030; }
</style>
</head>
<body>
<div class="swap-banner" id="swapBanner">
  <span id="swapBannerText"></span>
  <button id="swapCancelBtn">취소</button>
</div>
<div class="zoom-bar">
  <button id="zoomOut">🔍－</button>
  <span class="pct" id="zoomPct">150%</span>
  <button id="zoomIn">🔍＋</button>
</div>
<div class="wrap" id="zoomArea">
  <div class="nav">
    <button id="yPrev">‹</button>
    <div class="ttl" id="yearLabel">2026년</div>
    <button id="yNext">›</button>
  </div>
  <div class="nav">
    <button id="mPrev">‹</button>
    <div class="subttl" id="monthLabel" style="margin:0;">7월 근무표</div>
    <button id="mNext">›</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th class="sat">토</th><th class="sun">일</th>
      </tr>
    </thead>
    <tbody id="calBody"></tbody>
  </table>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBox"></div>
</div>

<script>
// ---------- config ----------
const TEAM_MEMBERS = {"1조":["종민","태주"], "2조":["민혁","태용"], "3조":["인석","찬진"]};
const VACATION_TYPES = [
  {v:"특별휴가", ic:"🌟"},
  {v:"하기휴가", ic:"☀️"},
  {v:"연차휴가", ic:"🌴"},
  {v:"병가",   ic:"🏥"},
  {v:"공가",   ic:"📋"},
];
const TEAM_CLASS = {"1조":"t1","2조":"t2","3조":"t3"};

function otherTeamMembers(team){
  let out = [];
  Object.keys(TEAM_MEMBERS).forEach(t => { if(t !== team) out = out.concat(TEAM_MEMBERS[t]); });
  return out;
}

// ---------- holidays ----------
// Exact 2026 table (includes 대체공휴일 / lunar holidays / 임시공휴일).
const HOLIDAYS_2026 = {
  "2026-1-1":"신정",
  "2026-2-16":"설날연휴", "2026-2-17":"설날", "2026-2-18":"설날연휴",
  "2026-3-1":"삼일절", "2026-3-2":"대체공휴일",
  "2026-5-1":"근로자의날",
  "2026-5-5":"어린이날",
  "2026-5-24":"부처님오신날", "2026-5-25":"대체공휴일",
  "2026-6-3":"지방선거일",
  "2026-6-6":"현충일",
  "2026-7-17":"제헌절",
  "2026-8-15":"광복절", "2026-8-17":"대체공휴일",
  "2026-9-24":"추석연휴", "2026-9-25":"추석", "2026-9-26":"추석연휴",
  "2026-10-3":"개천절", "2026-10-5":"대체공휴일",
  "2026-10-9":"한글날",
  "2026-12-25":"성탄절",
};
// Fixed-date national holidays that repeat every year regardless of weekday
// (used as a fallback for years outside the 2026 table above; lunar
// holidays and substitute days for those years are not calculated).
const FIXED_HOLIDAYS = {
  "1-1":"신정", "3-1":"삼일절", "5-1":"근로자의날", "5-5":"어린이날",
  "6-6":"현충일", "7-17":"제헌절", "8-15":"광복절", "10-3":"개천절",
  "10-9":"한글날", "12-25":"성탄절",
};

function fourthFridayOfOctober(y){
  const first = new Date(Date.UTC(y,9,1));
  const firstFriday = 1 + ((5 - first.getUTCDay() + 7) % 7);
  return firstFriday + 21;
}

function getHolidayName(y, m0, d){ // m0 is 0-indexed month
  const m = m0 + 1;
  const key2026 = `${y}-${m}-${d}`;
  if(y === 2026 && HOLIDAYS_2026[key2026]) return HOLIDAYS_2026[key2026];
  const fkey = `${m}-${d}`;
  if(FIXED_HOLIDAYS[fkey]) return FIXED_HOLIDAYS[fkey];
  if(m === 10 && d === fourthFridayOfOctober(y)) return "노조기념일";
  return null;
}

// team rotation cycle, anchored at 2026-07-01 = ["3조","1조"]
const CYCLE = [["3조","1조"], ["2조","3조"], ["1조","2조"]];
const ANCHOR = Date.UTC(2026,6,1); // 2026-07-01

function teamsFor(y,m,d){
  const t = Date.UTC(y,m,d);
  const diffDays = Math.round((t - ANCHOR)/86400000);
  let idx = diffDays % 3;
  if(idx < 0) idx += 3;
  return CYCLE[idx];
}

// ---------- state ----------
const today = new Date();
let viewYear = today.getFullYear(), viewMonth = today.getMonth(); // 0-indexed month
// key: "y-m-d-slot" -> array of {id, type:'vacation', name, vtype} or {id, type:'swap', from, to}
const entries = {};
let pendingSwap = null; // {y,m,d,slot,team} of the swap origin while picking a target date

function keyOf(y,m,d,slot){ return `${y}-${m}-${d}-${slot}`; }
function newId(){ return `${Date.now()}-${Math.random().toString(36).slice(2,7)}`; }

// ---------- weekly hour rules (day shift=8h, night shift=12h, 52h/week cap) ----------
function shiftHours(slot){ return slot === 0 ? 8 : 12; } // slot0=주간(day), slot1=야간(night)

function mondayOfWeek(y,m,d){
  const dt = new Date(Date.UTC(y,m,d));
  const dow = dt.getUTCDay(); // 0=Sun..6=Sat
  const diff = (dow === 0) ? -6 : (1 - dow);
  dt.setUTCDate(dt.getUTCDate() + diff);
  return {y: dt.getUTCFullYear(), m: dt.getUTCMonth(), d: dt.getUTCDate()};
}

function weekDatesFrom(monday){
  const arr = [];
  const dt = new Date(Date.UTC(monday.y, monday.m, monday.d));
  for(let i=0;i<7;i++){
    arr.push({y:dt.getUTCFullYear(), m:dt.getUTCMonth(), d:dt.getUTCDate()});
    dt.setUTCDate(dt.getUTCDate()+1);
  }
  return arr;
}

// Person's total scheduled hours (Mon-Sun) for the week containing the given Monday,
// including base team schedule plus any registered vacation (subtract) / swap (from:subtract, to:add) adjustments.
function weeklyHoursForPerson(name, monday){
  const days = weekDatesFrom(monday);
  let total = 0;
  days.forEach(day => {
    const teams = teamsFor(day.y, day.m, day.d);
    [0,1].forEach(slot => {
      const team = teams[slot];
      const hrs = shiftHours(slot);
      if(TEAM_MEMBERS[team] && TEAM_MEMBERS[team].includes(name)){
        total += hrs;
      }
      const list = entries[keyOf(day.y, day.m, day.d, slot)] || [];
      list.forEach(ex => {
        if(ex.type === "vacation" && ex.name === name){
          total -= hrs;
        } else if(ex.type === "swap"){
          if(ex.from === name) total -= hrs;
          if(ex.to === name) total += hrs;
        }
      });
    });
  });
  return total;
}

function isSameIsoWeek(y1,m1,d1,y2,m2,d2){
  const w1 = mondayOfWeek(y1,m1,d1);
  const w2 = mondayOfWeek(y2,m2,d2);
  return w1.y === w2.y && w1.m === w2.m && w1.d === w2.d;
}

function teamHasMondayOff(team, monday){
  const t = teamsFor(monday.y, monday.m, monday.d);
  return t[0] !== team && t[1] !== team;
}

// Simulate a two-way swap (origin<->target) for a specific requester/partner pair by
// temporarily registering both mirrored entries, checking the 52h/week cap for both
// people in both affected weeks, then rolling the temporary entries back.
function simulateSwapValid(origin, target, requesterName, partnerName){
  const kOrigin = keyOf(origin.y, origin.m, origin.d, origin.slot);
  const kTarget = keyOf(target.y, target.m, target.d, target.slot);
  const tmpO = "__sim__" + newId();
  const tmpT = "__sim__" + newId();

  if(!entries[kOrigin]) entries[kOrigin] = [];
  if(!entries[kTarget]) entries[kTarget] = [];
  entries[kOrigin].push({id: tmpO, type: "swap", from: requesterName, to: partnerName});
  entries[kTarget].push({id: tmpT, type: "swap", from: partnerName, to: requesterName});

  const mondayOrigin = mondayOfWeek(origin.y, origin.m, origin.d);
  const mondayTarget = mondayOfWeek(target.y, target.m, target.d);

  const ok =
    weeklyHoursForPerson(requesterName, mondayOrigin) <= 52 &&
    weeklyHoursForPerson(partnerName, mondayOrigin) <= 52 &&
    weeklyHoursForPerson(requesterName, mondayTarget) <= 52 &&
    weeklyHoursForPerson(partnerName, mondayTarget) <= 52;

  entries[kOrigin] = entries[kOrigin].filter(e => e.id !== tmpO);
  entries[kTarget] = entries[kTarget].filter(e => e.id !== tmpT);
  if(entries[kOrigin].length === 0) delete entries[kOrigin];
  if(entries[kTarget].length === 0) delete entries[kTarget];

  return ok;
}

// Is (y,m,d,slot,team) a valid swap-target candidate for the current pendingSwap origin?
// Rules:
//  - same shift type (day/night), a different team than the origin
//  - must be within the same calendar month as the origin date, and not before today
//  - same week as origin: any other team is eligible (day-day / night-night)
//  - different week: only a team that has that week's Monday off is eligible
//  - and (always) the swap must not push either person over 52h in either affected week
function isValidSwapCandidate(y,m,d,slot,team){
  if(!pendingSwap) return false;
  if(slot !== pendingSwap.slot) return false;
  if(team === pendingSwap.team) return false;

  const origin = pendingSwap;
  if(y !== origin.y || m !== origin.m) return false; // same month only

  const t0 = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
  const cand = Date.UTC(y,m,d);
  if(cand < t0) return false;

  const sameWeek = isSameIsoWeek(origin.y, origin.m, origin.d, y, m, d);
  if(!sameWeek){
    const monday = mondayOfWeek(y,m,d);
    if(!teamHasMondayOff(team, monday)) return false;
  }

  const target = {y,m,d,slot};
  return TEAM_MEMBERS[origin.team].some(req =>
    TEAM_MEMBERS[team].some(part => simulateSwapValid(origin, target, req, part))
  );
}

// ---------- persistence (Google Sheets via Apps Script web app) ----------
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxSPfdSutk_XDEdKJkh4iCI0iN0OHCl1NbsaQ0P265SDD4t_jaDNRu5R9fBFXi7wCOT/exec";
const STORAGE_KEY = "shift-manager3-entries-v1"; // local backup, used if the sheet is unreachable

function isRemoteConfigured(){
  return typeof SHEET_API_URL === "string" && SHEET_API_URL.startsWith("http");
}

async function loadEntries(){
  if(isRemoteConfigured()){
    try{
      const res = await fetch(SHEET_API_URL, {cache:"no-store"});
      const data = await res.json();
      Object.keys(data).forEach(k => { entries[k] = data[k]; });
      return;
    }catch(e){
      console.error("공유 저장소 불러오기 실패, 로컬 저장소로 대체합니다:", e);
    }
  }
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      Object.keys(parsed).forEach(k => { entries[k] = parsed[k]; });
    }
  }catch(e){
    console.error("불러오기 실패:", e);
  }
}

function saveEntries(){
  // always keep a local backup copy too
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }catch(e){}

  if(isRemoteConfigured()){
    fetch(SHEET_API_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain;charset=utf-8"}, // avoids CORS preflight
      body: JSON.stringify(entries)
    }).catch(e => console.error("공유 저장소 저장 실패:", e));
  }
}

// ---------- render calendar ----------
function render(){
  document.getElementById("yearLabel").textContent = `${viewYear}년`;
  document.getElementById("monthLabel").textContent = `${viewMonth+1}월 근무표`;

  const body = document.getElementById("calBody");
  body.innerHTML = "";

  const firstOfMonth = new Date(Date.UTC(viewYear, viewMonth, 1));
  // JS getUTCDay: Sun=0..Sat=6. We want Mon-first grid.
  let startOffset = (firstOfMonth.getUTCDay() + 6) % 7; // Mon=0
  const daysInMonth = new Date(Date.UTC(viewYear, viewMonth+1, 0)).getUTCDate();
  const daysInPrevMonth = new Date(Date.UTC(viewYear, viewMonth, 0)).getUTCDate();

  const cells = [];
  // leading days from previous month
  for(let i=startOffset; i>0; i--){
    const d = daysInPrevMonth - i + 1;
    const pm = viewMonth===0 ? 11 : viewMonth-1;
    const py = viewMonth===0 ? viewYear-1 : viewYear;
    cells.push({y:py, m:pm, d, other:true});
  }
  // this month
  for(let d=1; d<=daysInMonth; d++){
    cells.push({y:viewYear, m:viewMonth, d, other:false});
  }
  // trailing days to complete final week
  let trail = 1;
  while(cells.length % 7 !== 0){
    const nm = viewMonth===11 ? 0 : viewMonth+1;
    const ny = viewMonth===11 ? viewYear+1 : viewYear;
    cells.push({y:ny, m:nm, d:trail, other:true});
    trail++;
  }

  for(let w=0; w<cells.length/7; w++){
    const tr = document.createElement("tr");
    for(let c=0; c<7; c++){
      const cell = cells[w*7+c];
      const td = document.createElement("td");
      if(cell.other) td.className = "other";

      const dateDiv = document.createElement("div");
      const holidayName = getHolidayName(cell.y, cell.m, cell.d);
      const isToday = cell.y === today.getFullYear() && cell.m === today.getMonth() && cell.d === today.getDate();
      dateDiv.className = "date" + (holidayName?" holiday":"") + (isToday?" today":"");
      dateDiv.textContent = cell.d;
      td.appendChild(dateDiv);

      const hName = document.createElement("div");
      hName.className = "holiday-name";
      if(holidayName){
        hName.textContent = holidayName;
      } else {
        hName.textContent = "\u00A0";
        hName.style.visibility = "hidden";
      }
      td.appendChild(hName);

      const teams = teamsFor(cell.y, cell.m, cell.d);
      teams.forEach((team, slot) => {
        const badge = document.createElement("div");
        badge.className = "badge " + TEAM_CLASS[team];
        const k = keyOf(cell.y, cell.m, cell.d, slot);

        const label = document.createElement("span");
        label.textContent = team;
        badge.appendChild(label);

        const list = entries[k] || [];
        list.forEach(ex => {
          const line = document.createElement("span");
          line.className = "entry-line";
          if(ex.type === "swap"){
            if(ex.mirrorM !== undefined && ex.mirrorD !== undefined){
              line.textContent = `교대 ${cell.m+1}/${cell.d} ${ex.from}→${ex.mirrorM+1}/${ex.mirrorD} ${ex.to}`;
            } else {
              line.textContent = `교대 ${ex.from}→${ex.to}`;
            }
          } else {
            line.textContent = `${ex.name} ${ex.vtype}`;
          }
          badge.appendChild(line);
        });

        if(cell.other) badge.style.opacity = "0.55";

        const isOrigin = pendingSwap &&
          cell.y === pendingSwap.y && cell.m === pendingSwap.m && cell.d === pendingSwap.d &&
          slot === pendingSwap.slot && team === pendingSwap.team;
        const isCandidate = !isOrigin && isValidSwapCandidate(cell.y, cell.m, cell.d, slot, team);

        if(isOrigin) badge.classList.add("swap-origin");
        if(isCandidate) badge.classList.add("blink-candidate");

        if(pendingSwap){
          if(isOrigin){
            badge.addEventListener("click", () => { pendingSwap = null; render(); });
          } else if(isCandidate){
            badge.addEventListener("click", () => finalizeSwapPick(cell.y, cell.m, cell.d, slot, team));
          }
          // other badges are inert while picking a swap target
        } else if(!cell.other){
          badge.addEventListener("click", () => openMenu(cell.y, cell.m, cell.d, slot, team));
        }
        td.appendChild(badge);
      });

      tr.appendChild(td);
    }
    body.appendChild(tr);

    // weekly hours summary row (Mon-Sun), one line per person: "이름 : N시간"
    const mondayCell = cells[w*7];
    const monday = {y: mondayCell.y, m: mondayCell.m, d: mondayCell.d};
    const hoursRow = document.createElement("tr");
    const hoursTd = document.createElement("td");
    hoursTd.colSpan = 7;
    hoursTd.className = "hours-summary";
    const allNames = Object.values(TEAM_MEMBERS).flat();
    hoursTd.innerHTML = allNames.map(n => {
      const h = weeklyHoursForPerson(n, monday);
      const over = h > 52 ? " over" : "";
      return `<span class="hours-chip${over}">${n} : ${h}시간</span>`;
    }).join("");
    hoursRow.appendChild(hoursTd);
    body.appendChild(hoursRow);
  }

  const banner = document.getElementById("swapBanner");
  const bannerText = document.getElementById("swapBannerText");
  if(pendingSwap){
    banner.style.display = "flex";
    bannerText.textContent = `${pendingSwap.m+1}월 ${pendingSwap.d}일 · ${pendingSwap.team} 교대 대상을 선택하세요 (깜빡이는 조를 탭)`;
  } else {
    banner.style.display = "none";
  }
}

// ---------- modal flow ----------
const overlay = document.getElementById("overlay");
const modalBox = document.getElementById("modalBox");

function closeModal(){
  overlay.classList.remove("open");
  modalBox.innerHTML = "";
}

// names: array of strings. icons optional map name->emoji (not used for names).
function nameChips(names, selected, groupId){
  return names.map(n => `
    <div class="chip ${n===selected?"selected":""}" data-group="${groupId}" data-value="${n}">
      <span class="ic">👤</span><span>${n}</span>
    </div>`).join("");
}

function typeChips(selected, groupId){
  return VACATION_TYPES.map(t => `
    <div class="chip ${t.v===selected?"selected":""}" data-group="${groupId}" data-value="${t.v}">
      <span class="ic">${t.ic}</span><span>${t.v}</span>
    </div>`).join("");
}

function wireChipGroup(groupId, onPick){
  document.querySelectorAll(`.chip[data-group="${groupId}"]`).forEach(el => {
    el.onclick = () => {
      document.querySelectorAll(`.chip[data-group="${groupId}"]`).forEach(o => o.classList.remove("selected"));
      el.classList.add("selected");
      onPick(el.dataset.value);
    };
  });
}

function entryLabel(ex, m, d){
  if(ex.type === "swap"){
    if(ex.mirrorM !== undefined && ex.mirrorD !== undefined){
      return `교대 ${m+1}/${d} ${ex.from}→${ex.mirrorM+1}/${ex.mirrorD} ${ex.to}`;
    }
    return `교대 ${ex.from}→${ex.to}`;
  }
  return `${ex.name} · ${ex.vtype}`;
}

function openMenu(y, m, d, slot, team){
  const k = keyOf(y,m,d,slot);
  const list = entries[k] || [];

  const listHtml = list.length ? `
    <div class="entry-list">
      ${list.map(ex => `
        <div class="entry-item">
          <span class="txt">${entryLabel(ex, m, d)}</span>
          <span class="del" data-id="${ex.id}">삭제</span>
        </div>
      `).join("")}
    </div>
  ` : "";

  modalBox.innerHTML = `
    <h3>${m+1}월 ${d}일 · ${team}</h3>
    ${listHtml || '<div class="desc">등록된 기록이 없습니다.</div>'}
    <div class="choice-row">
      <button id="btnVacation">+ 휴가등록</button>
      <button id="btnSwap">+ 근무교대</button>
    </div>
    <div class="actions">
      <button class="btn-cancel" id="btnCancel">닫기</button>
    </div>
  `;
  overlay.classList.add("open");

  document.getElementById("btnCancel").onclick = closeModal;
  document.getElementById("btnVacation").onclick = () => openVacationForm(y,m,d,slot,team);
  document.getElementById("btnSwap").onclick = () => openSwapForm(y,m,d,slot,team);
  modalBox.querySelectorAll(".del").forEach(el => {
    el.onclick = () => {
      const target = (entries[k] || []).find(ex => ex.id === el.dataset.id);
      entries[k] = (entries[k] || []).filter(ex => ex.id !== el.dataset.id);
      if(entries[k].length === 0) delete entries[k];

      // a swap has a mirrored entry on the other date; remove that too
      if(target && target.type === "swap" && target.mirrorM !== undefined && target.mirrorD !== undefined){
        const mk = keyOf(target.mirrorY, target.mirrorM, target.mirrorD, slot);
        entries[mk] = (entries[mk] || []).filter(ex =>
          !(ex.type === "swap" && ex.from === target.to && ex.to === target.from &&
            ex.mirrorM === m && ex.mirrorD === d)
        );
        if(entries[mk] && entries[mk].length === 0) delete entries[mk];
      }

      saveEntries();
      render();
      openMenu(y,m,d,slot,team);
    };
  });
}

function openVacationForm(y,m,d,slot,team){
  const k = keyOf(y,m,d,slot);
  const members = TEAM_MEMBERS[team];

  let picked = { name: null, vtype: null };

  modalBox.innerHTML = `
    <span class="back" id="back">‹ 뒤로</span>
    <h3>${m+1}월 ${d}일 · ${team} 휴가등록</h3>
    <label>이름</label>
    <div class="chip-grid">${nameChips(members, picked.name, "vac-name")}</div>
    <label>휴가 종류</label>
    <div class="chip-grid">${typeChips(picked.vtype, "vac-type")}</div>
    <div class="actions">
      <button class="btn-cancel" id="btnCancel">취소</button>
      <button class="btn-confirm" id="btnConfirm">등록</button>
    </div>
  `;
  document.getElementById("back").onclick = () => openMenu(y,m,d,slot,team);
  document.getElementById("btnCancel").onclick = closeModal;
  wireChipGroup("vac-name", v => picked.name = v);
  wireChipGroup("vac-type", v => picked.vtype = v);
  document.getElementById("btnConfirm").onclick = () => {
    if(!picked.name || !picked.vtype){
      alert("이름과 휴가 종류를 모두 선택해주세요.");
      return;
    }
    if(!entries[k]) entries[k] = [];
    entries[k].push({id: newId(), type: "vacation", name: picked.name, vtype: picked.vtype});
    saveEntries();
    render();
    openMenu(y,m,d,slot,team);
  };
}

function openSwapForm(y,m,d,slot,team){
  // Enter "swap-picking mode": close the modal, blink valid target dates on the
  // calendar itself, and let the user tap one to finalize the exchange.
  pendingSwap = {y,m,d,slot,team};
  closeModal();
  render();
}

function finalizeSwapPick(ty,tm,td,tslot,tteam){
  const origin = pendingSwap;
  if(!origin) return;

  const target = {y:ty, m:tm, d:td, slot:tslot};
  const requesterPool = TEAM_MEMBERS[origin.team];
  const partnerPool = TEAM_MEMBERS[tteam];

  let picked = { from: null, to: null };

  function personChips(pool, groupId, isFrom){
    return pool.map(n => {
      const selected = n === (isFrom ? picked.from : picked.to);
      let ok;
      if(isFrom){
        ok = picked.to ? simulateSwapValid(origin, target, n, picked.to)
                       : partnerPool.some(p => simulateSwapValid(origin, target, n, p));
      } else {
        ok = picked.from ? simulateSwapValid(origin, target, picked.from, n)
                         : requesterPool.some(r => simulateSwapValid(origin, target, r, n));
      }
      const cls = ["chip"];
      if(selected) cls.push("selected");
      if(!ok) cls.push("disabled");
      else if(!selected) cls.push("blink-candidate");
      return `<div class="${cls.join(" ")}" data-group="${groupId}" data-value="${n}" ${ok ? "" : 'data-disabled="1"'}>
        <span class="ic">👤</span><span>${n}</span>
      </div>`;
    }).join("");
  }

  function renderModal(){
    modalBox.innerHTML = `
      <h3>${origin.m+1}월 ${origin.d}일 · ${origin.team} 근무교대</h3>
      <div class="desc">교대 대상: ${tm+1}월 ${td}일 · ${tteam}</div>
      <label>요청자 (${origin.team})</label>
      <div class="chip-grid">${personChips(requesterPool, "fin-from", true)}</div>
      <label>교대자 (${tteam})</label>
      <div class="chip-grid">${personChips(partnerPool, "fin-to", false)}</div>
      <div class="actions">
        <button class="btn-cancel" id="btnCancel">취소</button>
        <button class="btn-confirm" id="btnConfirm">등록</button>
      </div>
    `;
    modalBox.querySelectorAll('.chip[data-group="fin-from"]').forEach(el => {
      if(el.dataset.disabled) return;
      el.onclick = () => { picked.from = el.dataset.value; renderModal(); };
    });
    modalBox.querySelectorAll('.chip[data-group="fin-to"]').forEach(el => {
      if(el.dataset.disabled) return;
      el.onclick = () => { picked.to = el.dataset.value; renderModal(); };
    });
    document.getElementById("btnCancel").onclick = () => { pendingSwap = null; closeModal(); render(); };
    document.getElementById("btnConfirm").onclick = () => {
      if(!picked.from || !picked.to){
        alert("요청자와 교대자를 모두 선택해주세요.");
        return;
      }
      if(!simulateSwapValid(origin, target, picked.from, picked.to)){
        alert("이 조합은 주(월~일) 52시간 규칙을 초과합니다. 다른 사람을 선택해주세요.");
        return;
      }
      const kOrigin = keyOf(origin.y, origin.m, origin.d, origin.slot);
      const kTarget = keyOf(ty, tm, td, tslot);
      if(!entries[kOrigin]) entries[kOrigin] = [];
      if(!entries[kTarget]) entries[kTarget] = [];
      entries[kOrigin].push({
        id: newId(), type: "swap", from: picked.from, to: picked.to,
        mirrorY: ty, mirrorM: tm, mirrorD: td
      });
      entries[kTarget].push({
        id: newId(), type: "swap", from: picked.to, to: picked.from,
        mirrorY: origin.y, mirrorM: origin.m, mirrorD: origin.d
      });
      saveEntries();
      pendingSwap = null;
      closeModal();
      render();
    };
  }

  overlay.classList.add("open");
  renderModal();
}

overlay.addEventListener("click", (e) => {
  if(e.target === overlay) closeModal();
});

document.getElementById("swapCancelBtn").onclick = () => { pendingSwap = null; render(); };

// ---------- nav buttons ----------
document.getElementById("mPrev").onclick = () => { viewMonth--; if(viewMonth<0){viewMonth=11; viewYear--;} render(); };
document.getElementById("mNext").onclick = () => { viewMonth++; if(viewMonth>11){viewMonth=0; viewYear++;} render(); };
document.getElementById("yPrev").onclick = () => { viewYear--; render(); };
document.getElementById("yNext").onclick = () => { viewYear++; render(); };

// ---------- zoom controls ----------
let zoomLevel = 1.3; // default display size = 1.3x
const zoomArea = document.getElementById("zoomArea");
const zoomPct = document.getElementById("zoomPct");

function applyZoom(){
  zoomArea.style.zoom = zoomLevel;
  zoomPct.textContent = `${Math.round(zoomLevel * 100)}%`;
}
document.getElementById("zoomIn").onclick = () => {
  zoomLevel = Math.min(3, Math.round((zoomLevel + 0.1) * 10) / 10);
  applyZoom();
};
document.getElementById("zoomOut").onclick = () => {
  zoomLevel = Math.max(0.6, Math.round((zoomLevel - 0.1) * 10) / 10);
  applyZoom();
};
applyZoom();

// ---------- init ----------
document.getElementById("calBody").innerHTML =
  '<tr><td colspan="7" style="text-align:center;padding:30px;color:#697180;">데이터를 불러오는 중...</td></tr>';

async function init(){
  await loadEntries();
  render();
}
init();
</script>
